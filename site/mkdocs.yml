site_name: HKU-Notes
site_url: https://hku.jacobshing.com/
site_dir: output
theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - media: "(prefers-color-scheme)"
      accent: teal
      primary: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

    - scheme: default
      media: "(prefers-color-scheme: light)"
      accent: teal
      primary: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode

    - scheme: slate
      media: "(prefers-color-scheme: dark)"
      accent: teal
      primary: teal
      toggle:
        icon: material/cog
        name: Follow system theme

  features: 
    - content.tooltips
    - navigation.expand
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
repo_url: https://github.com/ShingZhanho/HKU-Notes
repo_name: ShingZhanho/HKU-Notes
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tilde
extra:
  analytics:
    provider: google
    property: G-DCVVW9HRJ5
extra_css:
  - stylesheets/extra.css
  - stylesheets/preview.css
extra_javascript:
  - javascripts/glightbox_events.js
use_directory_urls: false
plugins: 
  - glightbox:
      auto_themed: true
      manual: true
  - search:
      lang: en
      enabled: true
nav:
  - Home: index.md
  - Downloads:
    - Catalogue: downloads/index.md
    - Resources:
# == RES_LIST_PLACEHOLDER == #
      # items should be dynamically generated in the build pipeline
      # first level:
      #   - [course code]:
      # second level:
      #     - [target name]: downloads/details/[target name].md
  - References:
    - references.md
    - Contributing: contribution/index.md
    - Document Status: downloads/document-status.md
    - Syntax References:
      - authors.json: contribution/syntax-reference/authors.json.md
      - build-targets.txt: contribution/syntax-reference/build-targets.txt.md
      - metadata.json:
        - contribution/syntax-reference/metadata.json/index.md
        - Schema v1: contribution/syntax-reference/metadata.json/v1.md
        - Schema v2: contribution/syntax-reference/metadata.json/v2.md